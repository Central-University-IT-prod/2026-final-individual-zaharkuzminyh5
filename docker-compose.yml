services:
  # Основной API сервис
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - S3_ENDPOINT=minio:9000
      - S3_BUCKET=lookalike-data
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
    volumes:
      - ./.git:/app/.git
      - ./.dvc:/app/.dvc
      - ./dvc.yaml:/app/dvc.yaml
      - ./src:/app/src
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
      - ./params.yaml:/app/params.yaml
    depends_on:
      - minio
      - mlflow
    networks:
      - lookalike-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/ready"]
      interval: 10s
      timeout: 5s
      retries: 3

  # MinIO для хранения данных и моделей
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - lookalike-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MLflow для трекинга экспериментов (локальное хранилище)
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - MLFLOW_S3_IGNORE_TLS=true
    volumes:
      - mlflow-data:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlruns.db
      --default-artifact-root /mlflow/artifacts
    networks:
      - lookalike-network
    restart: unless-stopped

  # Инициализация S3 бакетов
  init-s3:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/lookalike-data --ignore-existing;
      mc mb myminio/lookalike-data/mlflow --ignore-existing;
      mc policy set public myminio/lookalike-data;
      exit 0;
      "
    networks:
      - lookalike-network

networks:
  lookalike-network:
    driver: bridge

volumes:
  minio-data:
  mlflow-data:
